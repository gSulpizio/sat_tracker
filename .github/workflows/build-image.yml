# Builds the sat_tracker Docker image and publishes it to GitHub Container
# Registry on every push to main that touches the app. Deployments that run
# `image: ghcr.io/gsulpizio/sat_tracker:latest` (see docker-compose.yml)
# pick updates up automatically — e.g. via Watchtower.
name: Build and publish Docker image

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "app/**"
      - "Dockerfile"
      - "requirements.txt"
      - ".github/workflows/build-image.yml"

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/gsulpizio/sat_tracker:latest
            ghcr.io/gsulpizio/sat_tracker:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
