# Two services from one shared image:
#   sat-tracker            — the Streamlit dashboard (idle web server; heavy
#                            work only runs when ▶ Run pipeline is clicked)
#   sat-tracker-collector  — 24/7 AIS websocket recorder (idle listener,
#                            negligible resources; watches every location
#                            saved in the app)
#
# Both carry hard mem/cpu ceilings so even a heavy manual run can't starve
# the host. Nothing runs on a schedule — compute is on-demand only.
#
# Configuration knobs (all optional):
#   SAT_TRACKER_DATA  host dir for persistent state (config, credentials,
#                     AIS store, cached snapshots). Default: ./data
#   SAT_TRACKER_ENV   env file with AIS_API_KEY etc. Default: ./.env
#   SAT_TRACKER_BIND  host port (or ip:port) for the dashboard.
#                     Default: 8501. Behind a reverse proxy on a shared
#                     docker network, bind loopback (e.g. 127.0.0.1:18501)
#                     so the auth gate can't be bypassed from the LAN.
#
# Quick start:  docker compose up -d --build  →  http://localhost:8501
# Both services default to the prebuilt image from GHCR (published by
# .github/workflows/build-image.yml on every push to main) — an updater
# like Watchtower then keeps deployments current automatically. To build
# locally instead: docker compose up -d --build (build wins over image).
services:
  sat-tracker:
    image: ghcr.io/gsulpizio/sat_tracker:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sat-tracker
    command: >
      streamlit run app/streamlit_app.py
      --server.address=0.0.0.0 --server.port=8501
      --server.headless=true --browser.gatherUsageStats=false
    ports:
      - "${SAT_TRACKER_BIND:-8501}:8501"
    volumes:
      - ${SAT_TRACKER_DATA:-./data}:/app/data
    env_file:
      - path: ${SAT_TRACKER_ENV:-./.env}
        required: false
    restart: unless-stopped
    mem_limit: 768m
    cpus: 1.5
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  sat-tracker-collector:
    image: ghcr.io/gsulpizio/sat_tracker:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sat-tracker-collector
    command: python -m backend.ingestion.ais_collector
    volumes:
      - ${SAT_TRACKER_DATA:-./data}:/app/data
    env_file:
      - path: ${SAT_TRACKER_ENV:-./.env}
        required: false
    restart: unless-stopped
    mem_limit: 192m
    cpus: 0.25
